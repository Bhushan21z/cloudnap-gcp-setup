title: "CloudNap Instance Operator + DNS"
description: "Least-privilege role for CloudNap SaaS to list/start/stop VMs and manage DNS record sets. Explicitly does NOT include delete, setMetadata, setServiceAccount, or create/delete DNS zones."
stage: "GA"
includedPermissions:
  # --- Compute: read + start/stop only ---
  - compute.instances.list
  - compute.instances.get
  - compute.instances.start
  - compute.instances.stop
  - compute.zones.list
  - compute.zoneOperations.get
  - compute.zoneOperations.list
  # Read-only enrichment (disk size, external IPs, machine type) shown in the VM list UI
  - compute.disks.list
  - compute.disks.get
  - compute.addresses.list
  - compute.machineTypes.list
  # --- DNS: manage record sets in existing zones (cannot create/delete zones) ---
  - dns.managedZones.list
  - dns.managedZones.get
  - dns.resourceRecordSets.list
  - dns.resourceRecordSets.get
  - dns.resourceRecordSets.create
  - dns.resourceRecordSets.update
  - dns.resourceRecordSets.delete
  - dns.changes.create
  - dns.changes.get
