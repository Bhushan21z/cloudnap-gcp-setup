title: "CloudNap Instance Operator + DNS + Billing"
description: "Least-privilege role for CloudNap SaaS: list/start/stop VMs, manage DNS record sets, plus read-only recommender, monitoring, asset inventory, and BigQuery jobs for the Billing Dashboard. No delete, setMetadata, setServiceAccount, or write access to recommendations or DNS zones."
stage: "GA"
includedPermissions:
  # --- Compute: read + start/stop only ---
  - compute.instances.list
  - compute.instances.get
  - compute.instances.start
  - compute.instances.stop
  - compute.zones.list
  - compute.zoneOperations.get
  - compute.zoneOperations.list
  # Read-only enrichment (disk size, external IPs, machine type) shown in the VM list UI
  - compute.disks.list
  - compute.disks.get
  - compute.addresses.list
  - compute.machineTypes.list

  # --- DNS: manage record sets in existing zones (cannot create/delete zones) ---
  - dns.managedZones.list
  - dns.managedZones.get
  - dns.resourceRecordSets.list
  - dns.resourceRecordSets.get
  - dns.resourceRecordSets.create
  - dns.resourceRecordSets.update
  - dns.resourceRecordSets.delete
  - dns.changes.create
  - dns.changes.get

  # --- Project / Resource Manager (read-only project metadata only) ---
  - resourcemanager.projects.get

  # --- Recommender (Compute recommendations — read + list, never apply) ---
  # NOTE: *UtilizationInsights* and Cloud SQL recommender permissions are
  # rejected at project-role scope. Grant roles/recommender.computeViewer
  # separately if you need commitment/insights data.
  - recommender.computeInstanceIdleResourceRecommendations.list
  - recommender.computeInstanceIdleResourceRecommendations.get
  - recommender.computeInstanceMachineTypeRecommendations.list
  - recommender.computeInstanceMachineTypeRecommendations.get
  - recommender.computeDiskIdleResourceRecommendations.list
  - recommender.computeDiskIdleResourceRecommendations.get
  - recommender.computeAddressIdleResourceRecommendations.list
  - recommender.computeAddressIdleResourceRecommendations.get
  - recommender.computeImageIdleResourceRecommendations.list

  # --- Cloud Monitoring: read utilization time-series ---
  - monitoring.timeSeries.list
  - monitoring.metricDescriptors.list
  - monitoring.metricDescriptors.get

  # --- Cloud Asset Inventory: resource inventory ---
  - cloudasset.assets.searchAllResources
  - cloudasset.assets.listAssets

  # --- BigQuery: run cost queries against the billing export dataset ---
  # NOTE: also grant roles/bigquery.dataViewer on the billing export dataset
  # to this service account — the setup script prints instructions for this.
  - bigquery.jobs.create
  - bigquery.tables.get
  - bigquery.tables.list

  # --- Service Usage: detect which APIs are enabled ---
  - serviceusage.services.list
  - serviceusage.services.get
