title: "CloudNap Instance Operator"
description: "Least-privilege role for CloudNap SaaS to list/start/stop VMs. Explicitly does NOT include delete, setMetadata, setServiceAccount, or any write permissions beyond start/stop."
stage: "GA"
includedPermissions:
  # --- Compute: read + start/stop only ---
  - compute.instances.list
  - compute.instances.get
  - compute.instances.start
  - compute.instances.stop
  - compute.zones.list
  - compute.zoneOperations.get
  - compute.zoneOperations.list
  # Read-only enrichment (disk size, external IPs, machine type) shown in the VM list UI
  - compute.disks.list
  - compute.disks.get
  - compute.addresses.list
  - compute.machineTypes.list
